<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Roadmap Generator</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>AI Roadmap Generator</h1>
        
        {% if error %}
        <div class="alert alert-error">
            ❌ {{ error }}
        </div>
        {% endif %}
        
        <form method="POST" action="/generate">
            <div class="form-group">
                <label for="topic">Topic:</label>
                <input type="text" id="topic" name="topic" placeholder="e.g., Machine Learning, Web Development" required>
            </div>
            
            <div class="form-group">
                <label for="level">Difficulty Level:</label>
                <select id="level" name="level" required>
                    <option value="">Select Level</option>
                    <option value="beginner">Beginner</option>
                    <option value="intermediate">Intermediate</option>
                    <option value="advanced">Advanced</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="duration">Duration (weeks):</label>
                <input type="number" id="duration" name="duration" min="1" max="52" placeholder="4" required>
            </div>
            
            <button type="submit">Generate Roadmap</button>
        </form>
        
        {% if roadmap %}
        <div class="roadmap">
            <h2>Your AI Roadmap</h2>
            <div class="roadmap-content">
                {{ roadmap | safe }}
            </div>
            <p class="download">
                <a href="/download?topic={{ topic }}&level={{ level }}&weeks={{ duration }}" class="btn-download">Download Text</a>
            </p>
            <button class="btn-reset" onclick="location.reload()">Generate Another</button>
        </div>
        {% endif %}
    </div>
</body>
</html>
